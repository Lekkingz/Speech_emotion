[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps =
    adafruit/Adafruit GFX Library@^1.6.0
    adafruit/Adafruit SSD1306@^2.5.11
    bblanchon/ArduinoJson@^7.0.0
    adafruit/Adafruit BusIO@^1.13.2
    tzapu/WiFiManager@^2.0.17

build_flags =
    -D WIFI_SSID=\"\"
    -D WIFI_PASSWORD=\"\"
    -D SERVER_URL=\"http://192.168.1.100:5000/predict\"
    -D AP_SSID=\"ESP32_SpeechEmotion\"
    -D AP_PASSWORD=\"\"

; PlatformIO environment configured for ESP32 (Arduino framework).
; WiFiManager is included to provide an automatic AP/captive portal for configuration.
