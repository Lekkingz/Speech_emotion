services:
  - type: web
    name: speech-emotion-system
    env: python
    region: frankfurt
    plan: free
    buildCommand: pip install -r requirements.txt && pip install -r server/requirements.txt
    startCommand: gunicorn server.app:app --workers 1 --threads 1 --bind 0.0.0.0:$PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.7
      - key: PYTHONPATH
        value: .
